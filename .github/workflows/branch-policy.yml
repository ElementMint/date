name: Branch Policy

on:
  pull_request:
    branches: [master]

jobs:
  validate-master-pr-source:
    name: Validate Master PR Source
    runs-on: ubuntu-latest
    steps:
      - name: Require develop as source branch
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [ "$HEAD_REF" != "develop" ]; then
            echo "Pull requests into master must come from develop."
            echo "Current source branch: $HEAD_REF"
            exit 1
          fi
